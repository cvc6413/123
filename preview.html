<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccy</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08), transparent 28%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.06), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      position: relative;
      padding: 3rem 4rem;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 16vw, 10rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--text);
      text-shadow: 0 6px 26px rgba(255,255,255,0.12);
      animation: float 4s ease-in-out infinite;
    }

    .glow {
      position: absolute;
      inset: auto;
      width: 220px;
      height: 220px;
      background: rgba(255,255,255,0.08);
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <main class="wrap" aria-label="Single page site">
    <div class="glow" aria-hidden="true"></div>
    <h1>ccy</h1>
  </main>
</body>
</html>
